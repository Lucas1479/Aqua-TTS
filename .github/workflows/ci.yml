name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check aqua/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e "." pytest pytest-cov numpy
      - name: Run unit tests (no GPT-SoVITS required)
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_server.py \
            --ignore=tests/test_vendor_paths.py \
            --cov=aqua \
            --cov-report=term
